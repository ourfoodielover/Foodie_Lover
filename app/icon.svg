<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F9D423"/>
      <stop offset="40%"  stop-color="#D4A017"/>
      <stop offset="70%"  stop-color="#C8860A"/>
      <stop offset="100%" stop-color="#A86A00"/>
    </linearGradient>
    <linearGradient id="goldCloche" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5C842"/>
      <stop offset="50%"  stop-color="#C8860A"/>
      <stop offset="100%" stop-color="#8B5E04"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="100" height="100" rx="16" fill="#000000"/>

  <!-- ── Cloche dome ───────────────────────────────────────────── -->
  <!-- plate base line -->
  <rect x="20" y="68" width="60" height="3" rx="1.5" fill="url(#goldCloche)"/>
  <!-- dome -->
  <ellipse cx="50" cy="62" rx="26" ry="12" fill="url(#goldCloche)"/>
  <!-- dome highlight -->
  <ellipse cx="43" cy="57" rx="9" ry="4" fill="#F9D42388" transform="rotate(-20 43 57)"/>
  <!-- knob on top of dome -->
  <circle cx="50" cy="50" r="3" fill="url(#goldCloche)"/>

  <!-- ── Stem from knob up to heart ───────────────────────────── -->
  <path d="M50 47 Q48 38 50 30" stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- ── Heart shape ──────────────────────────────────────────── -->
  <!-- Two lobes of the heart -->
  <path d="M50 30
           C50 30 36 18 36 26
           C36 33 50 42 50 42
           C50 42 64 33 64 26
           C64 18 50 30 50 30Z"
        fill="none" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round"/>

  <!-- ── Fork inside heart ─────────────────────────────────────── -->
  <!-- fork handle -->
  <line x1="50" y1="40" x2="50" y2="30" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <!-- fork tines (3 tines) -->
  <line x1="46" y1="22" x2="46" y2="28" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="21" x2="50" y2="27" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="22" x2="54" y2="28" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- fork neck bar -->
  <line x1="46" y1="28" x2="54" y2="28" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── Small red heart accent (matches logo's red heart on 'i') -->
  <circle cx="63" cy="19" r="3.5" fill="#e02020"/>
  <path d="M63 19 C63 19 59.5 16 59.5 18.5 C59.5 20.5 63 22.5 63 22.5 C63 22.5 66.5 20.5 66.5 18.5 C66.5 16 63 19 63 19Z" fill="#CC1010"/>
</svg>
